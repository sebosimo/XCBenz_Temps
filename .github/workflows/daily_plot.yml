name: Sounding Workflow

on:
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Download fresh data?'
        type: boolean
        default: false
  schedule:
    # Shifted minutes to avoid high-traffic marks
    - cron: '12,42 * * * *'

# --- FIX 1: Prevent multiple jobs from running at the same time ---
concurrency:
  group: weather-data-update
  cancel-in-progress: false # Let the current one finish, queue the next

jobs:
  update-weather-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
          # --- NEW STEP: FREE UP DISK SPACE ---
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Shallow clone to save disk space (avoid downloading huge .git history)
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev

      - name: Install Python Dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt

      - name: Restore cached data from data branch
        run: |
          # Pull existing cache_data from the data branch so that fetch_data.py
          # sees previous runs and cleanup_old_runs() keeps the full retention window.
          git fetch --depth=1 origin data 2>/dev/null || echo "data branch not found yet — starting fresh"
          git checkout FETCH_HEAD -- cache_data/ 2>/dev/null || true
          git checkout FETCH_HEAD -- cache_wind/ 2>/dev/null || true
          echo "Restored $(find cache_data -name '*.nc' 2>/dev/null | wc -l) .nc files from data branch"

      - name: Fetch Weather Data
        env:
          FORCE_REFRESH: ${{ github.event.inputs.force_refresh }}
          RETENTION_DAYS: "2" # Explicitly clean up data older than 2 days in CI
        run: uv run python fetch_data.py

      - name: Commit and Push Data
        run: |
          # 1. Setup Git Config
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git config --global http.postBuffer 524288000

          # Helper: rebase + push to main (with retries)
          function robust_push() {
            n=0
            until [ "$n" -ge 5 ]
            do
               git pull --rebase origin main && git push && break
               n=$((n+1))
               echo "Push failed. Retrying in 15 seconds... (Attempt $n/5)"
               sleep 15
            done
            if [ "$n" -ge 5 ]; then
              echo "Push failed after 5 attempts."
              exit 1
            fi
          }

          mkdir -p cache_data cache_wind

          # 2. Main branch: remove data files from tracking (one-time transition on first run,
          #    no-op on subsequent runs), bump data_version.txt to trigger Streamlit webhook
          git rm -rf --cached cache_data/ 2>/dev/null || true
          git rm -rf --cached cache_wind/ 2>/dev/null || true
          git rm --cached manifest.json 2>/dev/null || true
          date -u +'%Y%m%d_%H%M' > data_version.txt
          git add data_version.txt
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-update: $(date -u +'%Y-%m-%d %H:%M') UTC"
            robust_push
          fi

          # 3. Data branch: single orphan commit — no history accumulation
          #    The app reads all .nc files and manifest.json from this branch at runtime.
          git checkout --orphan data-temp
          git rm -rf --cached . 2>/dev/null || true
          git add -f cache_data/
          git add -f cache_wind/
          git add manifest.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Data snapshot: $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push origin HEAD:data --force
          else
            echo "No data to push to data branch"
          fi
          git checkout main
          git branch -D data-temp
